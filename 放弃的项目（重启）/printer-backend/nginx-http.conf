# ============================================================
# Nginx 配置 — HN 云打印（仅 HTTP，用于测试阶段）
# 将此文件复制到 /etc/nginx/sites-available/printer-backend
# 然后 ln -s /etc/nginx/sites-available/printer-backend /etc/nginx/sites-enabled/
# ============================================================

server {
    listen 80;
    server_name your-domain.com;   # 替换为你的域名或服务器 IP

    # 客户端上传文件大小限制（最大 50MB）
    client_max_body_size 50m;

    # 日志
    access_log /var/log/nginx/printer-backend-access.log;
    error_log  /var/log/nginx/printer-backend-error.log;

    location / {
        proxy_pass http://127.0.0.1:5000;

        # 基本代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 升级支持（Socket.IO 需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时（WebSocket 长连接）
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 静态文件 — 上传的文件（可选，直接由 Nginx 提供下载）
    location /uploads/ {
        alias /opt/printer-backend/uploads/;
        expires 1h;
    }
}
