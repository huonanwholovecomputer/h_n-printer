# ============================================================
# Nginx 配置 — HN 云打印（HTTPS + Let's Encrypt，生产环境）
# 先按 nginx-http.conf 配置好 HTTP，运行 certbot 获取证书后再替换为此文件
# ============================================================

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name your-domain.com;

    # Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站点
server {
    listen 443 ssl http2;
    server_name your-domain.com;   # 替换为你的域名

    # SSL 证书（Let's Encrypt）
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 客户端上传文件大小限制（最大 50MB）
    client_max_body_size 50m;

    # 日志
    access_log /var/log/nginx/printer-backend-access.log;
    error_log  /var/log/nginx/printer-backend-error.log;

    location / {
        proxy_pass http://127.0.0.1:5000;

        # 基本代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket 升级支持（Socket.IO 需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时（WebSocket 长连接）
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 静态文件
    location /uploads/ {
        alias /opt/printer-backend/uploads/;
        expires 1h;
    }
}
